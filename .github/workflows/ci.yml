# CI-as-evidence (B14; ADR-109): every push must rebuild the pure core, pass the unit
# suite, and re-run the Phase-0 rigs. Evidence artifacts are uploaded on every run.
# Repo is a monorepo (academy/ + engineering/ + implementation/); the Swift package
# lives in implementation/, so all run-steps execute there.
name: ci

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: implementation

jobs:
  build-test-evidence:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7 # current major; v4/v5 target the deprecated Node 20

      - name: Install Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.3.3-release
          swift-build: 6.3.3-RELEASE # 'tag' input is deprecated -> 'swift-build'

      - name: Build
        run: swift build

      - name: Unit tests (L0)
        run: swift test

      - name: Replay rigs (VV-101 + VV-110)
        run: swift run raxha-harness --corpus harness/corpus --evidence harness/evidence/ci-${{ matrix.os }}

      - name: Upload evidence package
        if: always() # a FAILING rig's evidence is exactly the evidence we need
        uses: actions/upload-artifact@v7 # current major; v4/v5 target the deprecated Node 20
        with:
          name: vv-evidence-${{ matrix.os }}
          path: implementation/harness/evidence/ci-${{ matrix.os }}
          retention-days: 90 # evidence packages are the regulatory artifact (B14) - keep them
